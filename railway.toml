[build]
builder = "NIXPACKS"

# Note: startCommand intentionally NOT set here — Nixpacks auto-detects
# `npm start` for the web service, and cron services override per-service
# via dashboard (Settings → Deploy → Custom Start Command). Setting it here
# would lock the field for all services.

[deploy]
healthcheckPath = "/api/health"
healthcheckTimeout = 30
# ALWAYS místo ON_FAILURE: instrumentation.ts dělá process.exit(0) každých
# 24h pro RAM reset (memory leak na Railway hobby). exit(0) je success
# exit, ON_FAILURE by ho nezachytil → ALWAYS restart pokrývá oba scénáře.
restartPolicyType = "ALWAYS"
restartPolicyMaxRetries = 10
